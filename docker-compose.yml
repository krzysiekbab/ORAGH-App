services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: oragh_postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    # Baza dostepna tylko w wewnetrznej sieci Docker (brak mapowania portu na host).
    expose:
      - "5432"
    networks:
      - oragh_network
    restart: unless-stopped

  # Django Backend API
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: oragh_backend
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=oragh_platform.settings.production
    volumes:
      - ./backend/media:/app/media
      - static_files:/app/staticfiles
    networks:
      - oragh_network
    restart: unless-stopped
    depends_on:
      - db
    # Healthcheck nadpisany tu (a nie w obrazie), by dzialal bez przebudowy.
    # X-Forwarded-Proto: https omija SECURE_SSL_REDIRECT (gunicorn na :8000 to czyste HTTP).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen(u.Request('http://localhost:8000/api/health/', headers={'X-Forwarded-Proto': 'https'}))"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    command: >
      sh -c "mkdir -p /app/logs &&
      echo 'Czekam na baze danych...' &&
      until python -c 'import socket; socket.create_connection((\"db\", 5432))'; do sleep 1; done &&
      echo 'Baza gotowa!' &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn oragh_platform.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  # Nginx Reverse Proxy (serves frontend static files + proxies backend)
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oragh_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - ./backend/media:/var/www/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - oragh_network
    restart: unless-stopped
    depends_on:
      - backend
    # 127.0.0.1 (nie localhost) — busybox wget woli IPv6 [::1], a nginx slucha tylko na IPv4.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
  static_files:

networks:
  oragh_network:
    driver: bridge
